services:
  # ─── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: algero-postgres
    environment:
      POSTGRES_DB: algero
      POSTGRES_USER: algero
      POSTGRES_PASSWORD: algero_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algero -d algero"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Laravel Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algero-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: algero
      DB_USERNAME: algero
      DB_PASSWORD: algero_secret
      SANCTUM_STATEFUL_DOMAINS: "localhost:3000,localhost:8000"
      FRONTEND_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algero-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
