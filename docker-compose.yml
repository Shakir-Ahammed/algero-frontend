services:
  # ─── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: algero-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algero}
      POSTGRES_USER: ${POSTGRES_USER:-algero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algero_secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algero} -d ${POSTGRES_DB:-algero}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Laravel Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algero-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-Algero}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-algero}
      DB_USERNAME: ${POSTGRES_USER:-algero}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-algero_secret}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000,localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@algero.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@algero.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Algero}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
    volumes:
      - uploads:/var/www/html/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algero-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
